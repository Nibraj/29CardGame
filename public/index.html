<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>29 Online</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section id="entry" class="panel">
        <h1>29 Card Game</h1>
        <p>Host a game or join with a room code. 4 players required.</p>
        <label>
          Name
          <input id="nameInput" maxlength="20" placeholder="Your name" />
        </label>
        <div class="row">
          <button id="createBtn">Create Room</button>
        </div>
        <div class="row">
          <input id="codeInput" maxlength="5" placeholder="Room code" />
          <button id="joinBtn">Join Room</button>
        </div>
        <p id="entryError" class="error"></p>
      </section>

      <section id="game" class="hidden">
        <header class="topbar">
          <div>
            <strong>Room:</strong> <span id="roomCode"></span>
          </div>
          <div>
            <strong>You:</strong> <span id="youName"></span>
          </div>
          <div>
            <strong>Game Points:</strong>
            <span id="gp0">0</span> - <span id="gp1">0</span>
          </div>
        </header>

        <section class="panel">
          <div class="row wrap">
            <button id="startBtn">Start Match</button>
            <button id="newMatchBtn" class="secondary">Back To Main Menu</button>
          </div>
          <p id="status"></p>
          <p id="roundResult" class="accent"></p>
        </section>

        <section class="panel board-shell">
          <div class="board-wrap">
            <aside class="side-panel">
              <h4>Round</h4>
              <div><span>Dealer</span><strong id="infoDealer">-</strong></div>
              <div><span>Bidder</span><strong id="infoBidder">-</strong></div>
              <div><span>Bid</span><strong id="infoBid">-</strong></div>
              <div><span>Trump</span><strong id="infoTrump">-</strong></div>
            </aside>

            <div class="table">
              <div class="seat" id="seat0"></div>
              <div class="seat" id="seat1"></div>
              <div class="seat" id="seat2"></div>
              <div class="seat" id="seat3"></div>
              <div class="trick" id="trickArea"></div>
            </div>

            <aside class="side-panel">
              <h4>Score</h4>
              <div><span>Target</span><strong id="infoTarget">-</strong></div>
              <div><span>Team 1</span><strong id="infoTeam0">0</strong></div>
              <div><span>Team 2</span><strong id="infoTeam1">0</strong></div>
              <div><span>Tricks</span><strong id="infoTricks">0 - 0</strong></div>
            </aside>
          </div>
        </section>

        <section class="panel">
          <h3>Your Hand</h3>
          <div id="hand" class="hand"></div>
        </section>

        <section class="panel" id="actionPanel">
          <h3>Actions</h3>
          <div id="actions"></div>
          <p id="actionError" class="error"></p>
        </section>

        <section class="panel">
          <h3>Log</h3>
          <ul id="log"></ul>
        </section>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
